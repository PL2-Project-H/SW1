<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contracts | SpecialistHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="shell px-6 py-6">
    <nav id="nav-links" class="glass mb-8 flex items-center justify-between rounded-3xl border px-6 py-4"></nav>
    <form id="milestone-build-form" class="glass mb-8 rounded-3xl border p-6 space-y-4">
      <h2 class="text-2xl font-semibold">Hierarchical Milestone Builder</h2>
      <div class="flex gap-3 items-end">
        <div class="flex-1">
          <label class="block text-sm text-slate-500 mb-1">Contract ID</label>
          <input id="build_contract_id" class="w-full rounded-2xl border px-4 py-3" placeholder="Contract ID" required>
        </div>
      </div>
      <div id="milestone-rows" class="space-y-3"></div>
      <button type="button" id="add-milestone-btn" class="rounded-xl bg-slate-600 px-4 py-2 text-white text-sm">+ Add Milestone</button>
      <button type="submit" class="w-full rounded-2xl bg-slate-950 px-4 py-3 text-white">Save Milestones</button>
    </form>
    <div id="nda-signing-wrap" class="hidden glass mb-8 rounded-3xl border p-6 bg-amber-50">
      <h2 class="text-2xl font-semibold text-amber-900">Sign Pending NDA</h2>
      <p class="mt-2 text-sm text-amber-800">Review and sign the Non-Disclosure Agreement to activate your contract.</p>
      <div id="nda-content" class="mt-4 p-4 bg-white rounded-xl border text-xs text-slate-600 h-32 overflow-y-auto mb-4 italic"></div>
      <button id="sign-nda-btn" class="rounded-2xl bg-amber-600 px-6 py-3 text-white font-medium">I Digitally Sign this NDA</button>
    </div>

    <div id="qa-checklist-wrap" class="hidden glass mb-8 rounded-3xl border p-6 bg-emerald-50">
      <h2 class="text-2xl font-semibold text-emerald-900">Mandatory QA Checklist</h2>
      <p class="mt-2 text-sm text-emerald-800">You must verify all quality standards before submitting your work.</p>
      <form id="qa-checklist-form" class="mt-4 space-y-3">
        <label class="flex items-center gap-3 text-sm"><input type="checkbox" name="files_complete" required> All deliverable files are complete and named correctly</label>
        <label class="flex items-center gap-3 text-sm"><input type="checkbox" name="requirements_met" required> Work meets all requirements stated in the contract</label>
        <label class="flex items-center gap-3 text-sm"><input type="checkbox" name="no_placeholder_data" required> No placeholder or test data included</label>
        <label class="flex items-center gap-3 text-sm"><input type="checkbox" name="formats_match" required> File formats match what was agreed</label>
        <button type="submit" class="mt-2 rounded-xl bg-emerald-600 px-6 py-2 text-white text-sm">Submit QA & Unlock Upload</button>
      </form>
    </div>

    <div id="milestone-detail" class="hidden mb-8 space-y-6"></div>
    <div id="contract-messages-wrap" class="hidden glass mb-8 rounded-3xl border p-6 space-y-4">
      <h2 class="text-2xl font-semibold">Contract messages</h2>
      <div id="contract-message-list" class="max-h-64 space-y-2 overflow-y-auto text-sm"></div>
      <form id="contract-message-form" class="flex gap-2">
        <input id="contract_message_input" type="text" class="flex-1 rounded-2xl border px-4 py-3" placeholder="Message" required>
        <button type="submit" class="rounded-2xl bg-slate-900 px-4 py-3 text-white">Send</button>
      </form>
    </div>
    <div id="contract-list" class="space-y-6"></div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/contract.js"></script>
</body>
</html>
