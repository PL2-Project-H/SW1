<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contracts | SpecialistHub</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    .stepper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      margin-bottom: 2rem;
    }

    .stepper::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--border);
      z-index: 1;
      transform: translateY(-50%);
    }

    .step {
      position: relative;
      z-index: 2;
      background: var(--paper);
      padding: 0.25rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      border-radius: 9999px;
      border: 1px solid var(--border);
    }

    .step.active {
      color: var(--ink);
      border-color: var(--gold);
      background: var(--gold-light);
    }

    .step.done {
      color: var(--success);
      border-color: var(--success-bg);
      background: #f0fdf4;
    }


    .chat-window {
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem 0;
    }

    .bubble {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      position: relative;
    }

    .bubble-sent {
      align-self: flex-end;
      background: var(--ink);
      color: var(--paper);
      border-bottom-right-radius: 2px;
    }

    .bubble-recv {
      align-self: flex-start;
      background: var(--card-bg);
      border: 1px solid var(--border-input);
      color: var(--ink);
      border-bottom-left-radius: 2px;
    }

    .bubble-meta {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-bottom: 0.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .nda-banner {
      background: #fef3c7;
      border-left: 4px solid #d97706;
      padding: 1rem 1.5rem;
      border-radius: 4px;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>
  <main class="shell">

    <div id="general-err"></div>

    <div id="nda-signing-wrap" class="hidden nda-banner">
      <div>
        <h2 style="font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:#b45309;">Signature
          Pending</h2>
        <p style="font-size:0.85rem; color:#92400e; margin-top:0.25rem;">A Non-Disclosure Agreement must be signed prior
          to activating the escrow systems.</p>
        <div id="nda-content"
          style="margin-top:1rem; padding:1rem; background:rgba(255,255,255,0.6); font-family:monospace; font-size:0.75rem; color:#78350f; max-height:100px; overflow-y:auto; border-radius:4px;">
        </div>
      </div>
      <div>
        <button id="sign-nda-btn" class="btn-primary" style="background:#b45309;">Digitally Sign</button>
      </div>
    </div>

    <!-- Layout Grid -->
    <div
      style="display: grid; gap: 2rem; grid-template-columns: 1fr; @media(min-width:1024px){ grid-template-columns: 2fr 1fr; }">

      <!-- Primary Core: Contracts & Milestones -->
      <section>
        <div class="header-layout"
          style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
          <h1 class="page-header m-0">Contract Workspace</h1>
        </div>

        <div id="contract-list"></div>

        <form id="milestone-build-form" class="card" style="margin-top: 2rem; margin-bottom: 2rem;">
          <div class="card-header">
            <h2 style="font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700;">Milestone Architect
            </h2>
          </div>
          <div class="card-body">
            <p style="font-size:0.85rem; color:var(--muted); margin-bottom:1.5rem;">Design the phased deliverables.
              Milestones execute sequentially allowing escrow funding to map to specific deliverables securely.</p>

            <div class="form-group" style="max-width: 300px;">
              <label class="sh-label">Target Contract ID</label>
              <input id="build_contract_id" class="sh-input" placeholder="e.g. 1" required>
            </div>

            <div id="milestone-rows" style="display:flex; flex-direction:column; gap:1rem; margin-bottom:1.5rem;"></div>

            <div style="display:flex; gap:1rem;">
              <button type="button" id="add-milestone-btn" class="btn-secondary">+ Add Phase</button>
              <button type="submit" class="btn-primary">Commit Architecture</button>
            </div>
          </div>
        </form>

        <div id="milestone-detail" class="hidden"></div>
      </section>

      <!-- Sidebar: Chat & Status -->
      <section>
        <div id="contract-messages-wrap" class="hidden card" style="position: sticky; top: 100px;">
          <div class="card-header" style="background:var(--ink); color:var(--paper);">
            <h2 style="font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700;">Contract Safe-Room</h2>
          </div>
          <div class="card-body" style="padding: 1rem;">
            <div id="contract-message-list" class="chat-window"></div>
          </div>
          <div class="card-footer" style="padding: 1rem; border-top: 1px solid var(--border-input);">
            <form id="contract-message-form" style="display:flex; gap:0.5rem;">
              <input id="contract_message_input" type="text" class="sh-input" placeholder="Secure message..." required
                style="border-radius:9999px;">
              <button type="submit" class="btn-primary"
                style="border-radius:9999px; padding: 0.5rem 1rem;">Send</button>
            </form>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/contract.js"></script>
</body>

</html>
