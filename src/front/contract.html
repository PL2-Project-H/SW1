<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contracts | SpecialistHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="shell px-6 py-6">
    <nav id="nav-links" class="glass mb-8 flex items-center justify-between rounded-3xl border px-6 py-4"></nav>
    <form id="milestone-build-form" class="glass mb-8 rounded-3xl border p-6 space-y-4">
      <h2 class="text-2xl font-semibold">Hierarchical Milestone Builder</h2>
      <input id="build_contract_id" class="w-full rounded-2xl border px-4 py-3" placeholder="Contract ID">
      <textarea id="milestones_json" class="h-32 w-full rounded-2xl border px-4 py-3" placeholder='[{"title":"Discovery","amount":200,"order_index":1,"due_date":"2026-03-25 12:00:00"}]'></textarea>
      <button class="rounded-2xl bg-slate-950 px-4 py-3 text-white">Save Milestones</button>
    </form>
    <div id="contract-list" class="space-y-6"></div>
  </div>
  <script src="js/app.js?v=20260324b"></script>
  <script src="js/contract.js?v=20260324b"></script>
</body>
</html>
