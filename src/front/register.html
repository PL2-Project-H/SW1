<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | SpecialistHub</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
      margin: 0;
    }

    .panel-left {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse 70% 50% at 40% 50%, rgba(201, 168, 76, 0.15) 0%, transparent 70%),
        linear-gradient(160deg, #1a1712 0%, #0d0d0d 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
      min-height: 100vh;
      animation: panelIn 0.7s ease both;
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .panel-deco-circle {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(201, 168, 76, 0.12);
    }

    .panel-deco-circle-1 {
      width: 400px;
      height: 400px;
      top: -120px;
      right: -120px;
    }

    .panel-deco-circle-2 {
      width: 240px;
      height: 240px;
      bottom: 5%;
      left: -60px;
    }

    .panel-deco-circle-3 {
      width: 120px;
      height: 120px;
      bottom: 30%;
      right: 10%;
    }

    .panel-deco-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.2), transparent);
    }

    .pdl-1 {
      width: 60%;
      top: 35%;
      left: 10%;
    }

    .pdl-2 {
      width: 40%;
      bottom: 30%;
      right: 5%;
    }

    .panel-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--paper);
      text-decoration: none;
      letter-spacing: 0.02em;
      position: relative;
      z-index: 1;
    }

    .panel-logo span {
      color: var(--gold);
    }

    .panel-body {
      position: relative;
      z-index: 1;
    }

    .panel-tag {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .panel-tag::before {
      content: '';
      display: block;
      width: 1.5rem;
      height: 1px;
      background: var(--gold);
    }

    .panel-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      font-weight: 900;
      line-height: 1.1;
      color: var(--paper);
      margin-bottom: 1.25rem;
    }

    .panel-headline em {
      font-style: italic;
      color: var(--gold);
    }

    .panel-sub {
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.7;
      color: rgba(245, 242, 236, 0.55);
      max-width: 34ch;
    }

    .panel-footer {
      position: relative;
      z-index: 1;
      font-size: 0.75rem;
      color: rgba(245, 242, 236, 0.3);
    }

    .panel-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 4rem;
      animation: formIn 0.7s 0.15s ease both;
      overflow-y: auto;
      max-height: 100vh;
    }

    @keyframes formIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-header {
      margin-bottom: 2.5rem;
    }

    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .form-subtitle {
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--muted);
    }

    .form-subtitle a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
    }

    .form-subtitle a:hover {
      text-decoration: underline;
    }

    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 2.25rem;
      border: 1px solid var(--border-input);
      border-radius: 2px;
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      padding: 0.65rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      text-align: center;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab-btn.active {
      background: var(--ink);
      color: var(--paper);
    }

    .tab-btn:not(.active):hover {
      background: rgba(13, 13, 13, 0.06);
      color: var(--ink);
    }

    .submit-btn {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--ink);
      border: none;
      border-radius: 2px;
      padding: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .submit-btn:hover {
      background: #1f1f1f;
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }



    .role-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .role-option {
      position: relative;
    }

    .role-option input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .role-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-input);
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .role-card svg {
      width: 24px;
      height: 24px;
      color: var(--muted);
      transition: color 0.2s;
    }

    .role-card span {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.2s;
    }

    .role-option input:checked+.role-card {
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 12px rgba(201, 168, 76, 0.1);
    }

    .role-option input:checked+.role-card svg {
      color: var(--gold);
    }

    .role-option input:checked+.role-card span {
      color: var(--ink);
    }

    .slide-panel {
      overflow: hidden;
      transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.4s ease;
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }

    .slide-panel.show {
      max-height: 200px;
      opacity: 1;
      margin-top: 1rem;
    }

    @media (max-width: 768px) {
      body {
        grid-template-columns: 1fr;
      }

      .panel-left {
        min-height: 220px;
        padding: 2rem;
      }

      .panel-body .panel-headline {
        font-size: 1.6rem;
      }

      .panel-right {
        padding: 2.5rem 1.5rem;
        overflow: visible;
      }

      .role-options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="panel-left">
    <div class="panel-deco-circle panel-deco-circle-1"></div>
    <div class="panel-deco-circle panel-deco-circle-2"></div>
    <div class="panel-deco-circle panel-deco-circle-3"></div>
    <div class="panel-deco-line pdl-1"></div>
    <div class="panel-deco-line pdl-2"></div>

    <a href="index.html" class="panel-logo">Specialist<span>Hub</span></a>

    <div class="panel-body">
      <p class="panel-tag">Join the platform</p>
      <h2 class="panel-headline">
        Deploy your<br>
        <em>expertise</em><br>
        safely.
      </h2>
      <p class="panel-sub">
        Create your account to start managing contracts, securing payments, and engaging with specialized professionals.
      </p>
    </div>

    <div class="panel-footer">© 2026 SpecialistHub</div>
  </div>

  <div class="panel-right">
    <div class="form-header">
      <h1 class="form-title">Register</h1>
      <p class="form-subtitle">Already have an account? <a href="login.html">Sign in</a></p>
    </div>

    <div class="tab-bar">
      <a href="login.html" class="tab-btn">Log In</a>
      <a href="register.html" class="tab-btn active">Sign Up</a>
    </div>

    <div id="register-container"></div>

    <form id="register-form" autocomplete="off">
      <div class="form-group">
        <label class="sh-label">Account type</label>
        <div class="role-options">
          <label class="role-option">
            <input type="radio" name="role" value="client" checked>
            <div class="role-card">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M19 21v-2a4 4 0 00-4-4H9a4 4 0 00-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <span>Client</span>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="freelancer">
            <div class="role-card">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
              </svg>
              <span>Freelancer</span>
            </div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="admin">
            <div class="role-card">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <span>Admin</span>
            </div>
          </label>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label class="sh-label">Full legal name</label>
          <input name="name" class="sh-input" placeholder="Jane Smith" required>
        </div>
        <div class="form-group">
          <label class="sh-label">Email address</label>
          <input name="email" type="email" class="sh-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="sh-label">Password</label>
          <input name="password" type="password" class="sh-input" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label class="sh-label">Country</label>
          <input name="country" class="sh-input" placeholder="Egypt" required>
        </div>
        <div class="form-group">
          <label class="sh-label">Timezone</label>
          <input name="timezone" class="sh-input" placeholder="UTC" value="UTC" required>
        </div>
        <div class="form-group">
          <label class="sh-label">ID Type <span style="text-transform:none;letter-spacing:0">(optional)</span></label>
          <input name="id_type" class="sh-input" placeholder="national_id, passport…">
        </div>
      </div>

      <div id="freelancer-fields" class="slide-panel">
        <div class="form-grid">
          <div class="form-group">
            <label class="sh-label">Specialty niche</label>
            <select name="niche" class="sh-select">
              <option value="data_science">Data Science</option>
              <option value="legal">Legal</option>
              <option value="translation">Translation</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="sh-label">Hourly rate (USD)</label>
            <input name="hourly_rate" class="sh-input" placeholder="0.00">
          </div>
        </div>
      </div>

      <div id="admin-fields" class="slide-panel">
        <div class="form-group">
          <label class="sh-label">Admin role</label>
          <select name="admin_role" class="sh-select">
            <option value="">No admin role</option>
            <option value="financial_admin">Financial Admin</option>
            <option value="dispute_mediator">Dispute Mediator</option>
            <option value="tech_support">Tech Support</option>
          </select>
        </div>
      </div>

      <button type="submit" class="submit-btn">
        Create account
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>
    </form>

  </div>

  <script src="js/app.js"></script>
  <script>
    const roleRadios = document.querySelectorAll('input[name="role"]');
    const fFields = document.getElementById('freelancer-fields');
    const aFields = document.getElementById('admin-fields');

    roleRadios.forEach(r => r.addEventListener('change', () => {
      const val = document.querySelector('input[name="role"]:checked').value;
      fFields.classList.toggle('show', val === 'freelancer');
      aFields.classList.toggle('show', val === 'admin');
    }));

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = Object.fromEntries(new FormData(e.target).entries());
      if (payload.role !== 'freelancer') { delete payload.niche; delete payload.hourly_rate; }
      if (payload.role !== 'admin') delete payload.admin_role;

      const container = document.getElementById('register-container');
      showLoading(container);
      try {
        const res = await apiCall('auth.php?action=register', 'POST', payload);
        window.sessionUser = res.user;
        location.replace('dashboard.html');
      } catch (err) {
        stopLoading(container);
        showError(container, err.message);
      }
    });


  </script>
</body>

</html>
