<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobs | SpecialistHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="shell px-6 py-6">
    <nav id="nav-links" class="glass mb-8 flex items-center justify-between rounded-3xl border px-6 py-4"></nav>
    <section id="search-panel" class="hidden glass mb-8 rounded-3xl border p-6">
      <div class="grid gap-4 md:grid-cols-3">
        <input id="search_keyword" class="rounded-2xl border px-4 py-3" placeholder="Keyword">
        <select id="search_niche" class="rounded-2xl border px-4 py-3"><option value="">All niches</option><option value="data_science">Data Science</option><option value="legal">Legal</option><option value="translation">Translation</option><option value="other">Other</option></select>
        <input id="search_budget" class="rounded-2xl border px-4 py-3" placeholder="Max budget">
      </div>
    </section>
    <section id="job-form-wrap" class="hidden glass mb-8 rounded-3xl border p-6">
      <h2 class="mb-4 text-2xl font-semibold">Post a Job</h2>
      <form id="job-form" class="grid gap-4 md:grid-cols-2">
        <input name="title" class="rounded-2xl border px-4 py-3" placeholder="Job title" required>
        <select id="job-niche" name="niche" class="rounded-2xl border px-4 py-3"><option value="data_science">Data Science</option><option value="legal">Legal</option><option value="translation">Translation</option><option value="other">Other</option></select>
        <textarea name="description" class="md:col-span-2 h-28 rounded-2xl border px-4 py-3" placeholder="Description"></textarea>
        <input name="budget" class="rounded-2xl border px-4 py-3" placeholder="Budget">
        <input name="deadline" type="datetime-local" class="rounded-2xl border px-4 py-3">
        <select name="visibility" class="rounded-2xl border px-4 py-3"><option value="public">Public</option><option value="invitation">Invitation Only</option></select>
        <input name="invitees" class="rounded-2xl border px-4 py-3" placeholder="Invite freelancer IDs or emails">
        <div id="translation-fields" class="hidden md:col-span-2 grid gap-4 md:grid-cols-3">
          <input name="source_language" class="rounded-2xl border px-4 py-3" placeholder="Source language">
          <input name="target_language" class="rounded-2xl border px-4 py-3" placeholder="Target language">
          <input name="word_count" class="rounded-2xl border px-4 py-3" placeholder="Word count">
        </div>
        <div id="data-fields" class="hidden md:col-span-2 grid gap-4 md:grid-cols-3">
          <input name="data_stack" class="rounded-2xl border px-4 py-3" placeholder="Data stack">
          <input name="dataset_size" class="rounded-2xl border px-4 py-3" placeholder="Dataset size">
          <input name="deliverable_format" class="rounded-2xl border px-4 py-3" placeholder="Deliverable format">
        </div>
        <div id="legal-fields" class="hidden md:col-span-2 grid gap-4 md:grid-cols-3">
          <input name="jurisdiction" class="rounded-2xl border px-4 py-3" placeholder="Jurisdiction">
          <input name="case_type" class="rounded-2xl border px-4 py-3" placeholder="Case type">
          <label class="flex items-center gap-2 rounded-2xl border px-4 py-3"><input type="checkbox" name="confidentiality_required" value="1"> Confidentiality required</label>
        </div>
        <button class="md:col-span-2 rounded-2xl bg-slate-950 px-4 py-3 text-white">Create Job</button>
      </form>
    </section>
    <section id="job-results" class="grid gap-5"></section>
  </div>
  <script src="js/app.js"></script>
  <script src="js/jobs.js"></script>
</body>
</html>
