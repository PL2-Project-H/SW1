<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escrow | SpecialistHub</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    .timeline {
      border-left: 2px solid var(--border);
      padding-left: 2rem;
      margin-left: 0.5rem;
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .timeline-item {
      position: relative;
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -2rem;
      top: 0.25rem;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--paper);
      box-shadow: 0 0 0 2px var(--border);
    }

    .timeline-item.cleared::before {
      background: var(--success);
      box-shadow: 0 0 0 2px var(--success-bg);
    }
  </style>
</head>

<body>
  <main class="shell">

    <div class="header-layout" style="margin-bottom: 2rem;">
      <h1 class="page-header m-0">Escrow Security</h1>
      <a href="contract.html" class="btn-secondary">Return to Contract</a>
    </div>

    <!-- Quick Stats -->
    <div id="stats-grid"
      style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 3rem;">
      <!-- Injected hcards -->
    </div>

    <div id="escrow-milestones"></div>

    <!-- Ledger Timeline -->
    <section>
      <h2 class="section-title">Transaction Timeline</h2>
      <div id="ledger-box" style="margin-top: 1rem;"></div>
    </section>

  </main>

  <script src="js/app.js"></script>
  <script src="js/escrow.js"></script>
</body>

</html>
