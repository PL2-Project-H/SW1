<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | SpecialistHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="shell px-6 py-6">
    <nav id="nav-links" class="glass mb-8 flex items-center justify-between rounded-3xl border px-6 py-4"></nav>
    <div class="space-y-8">
      <section><h2 class="mb-4 text-2xl font-semibold">Dashboard</h2><div id="admin-dashboard" class="grid gap-4 md:grid-cols-3"></div></section>
      <section><h2 class="mb-4 text-2xl font-semibold">Users</h2><div id="users-table" class="grid gap-3"></div></section>
      <section><h2 class="mb-4 text-2xl font-semibold">Credentials Queue</h2><div id="credentials-table" class="grid gap-3"></div></section>
      <section><h2 class="mb-4 text-2xl font-semibold">KYC Queue</h2><div id="kyc-table" class="grid gap-3"></div></section>
      <section><h2 class="mb-4 text-2xl font-semibold">Disputes</h2><div id="dispute-table" class="grid gap-3"></div></section>
      <section><h2 class="mb-4 text-2xl font-semibold">Niche Reports</h2><div id="reports-table" class="grid gap-3"></div></section>
      <section><h2 class="mb-4 text-2xl font-semibold">Audit Trail</h2><div id="audit-table" class="grid gap-3"></div></section>
      <section>
        <h2 class="mb-4 text-2xl font-semibold">Archived Messages</h2>
        <div class="mb-4 flex gap-3">
          <input id="archive-search" class="rounded-2xl border px-4 py-3" placeholder="Search archived messages">
          <button id="archive-refresh" class="rounded-2xl bg-slate-900 px-4 py-3 text-white">Search</button>
        </div>
        <div id="archive-table" class="grid gap-3"></div>
      </section>
      <section class="flex gap-4"><button id="rebuild-index" class="rounded-2xl bg-slate-950 px-4 py-3 text-white">Rebuild Index</button><button id="send-digest" class="rounded-2xl bg-emerald-600 px-4 py-3 text-white">Send Weekly Digest</button></section>
    </div>
  </div>
  <script src="js/app.js?v=20260324c"></script>
  <script src="js/admin.js?v=20260324c"></script>
</body>
</html>
