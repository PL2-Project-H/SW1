<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disputes | SpecialistHub</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    .chat-window {
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem 0;
    }

    .bubble {
      max-width: 75%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      position: relative;
    }

    .bubble-sent {
      align-self: flex-end;
      background: var(--ink);
      color: var(--paper);
      border-bottom-right-radius: 2px;
    }

    .bubble-recv {
      align-self: flex-start;
      background: var(--card-bg);
      border: 1px solid var(--border-input);
      color: var(--ink);
      border-bottom-left-radius: 2px;
    }

    .bubble-meta {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-bottom: 0.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }


    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 13, 0.4);
      backdrop-filter: blur(4px);
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      display: flex;
      justify-content: flex-end;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .slide-over {
      background: var(--paper);
      width: 100%;
      max-width: 450px;
      height: 100%;
      box-shadow: -20px 0 60px rgba(0, 0, 0, 0.1);
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .modal-overlay.show .slide-over {
      transform: translateX(0);
    }

    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--ink);
    }
  </style>
</head>

<body>
  <main class="shell">

    <div class="header-layout">
      <div>
        <h1 class="page-header m-0">Resolutions & Disputes</h1>
        <p style="font-size:0.9rem; color:var(--muted); margin-top:0.25rem;">Mediation safe-room for structured
          arbitration.</p>
      </div>
      <button id="trigger-file-dispute" class="btn-danger">+ File Dispute</button>
    </div>

    <!-- Layout Grid -->
    <div
      style="display: grid; gap: 2rem; grid-template-columns: 1fr; @media(min-width:1024px){ grid-template-columns: 1fr 2fr; }">

      <!-- Left Column: Dispute List -->
      <section>
        <div class="card" style="position: sticky; top: 100px;">
          <div class="card-header">
            <h2 style="font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700;">Active Cases</h2>
          </div>
          <div class="card-body" style="padding: 1rem;">
            <div id="dispute-list" style="display:flex; flex-direction:column; gap:0.5rem;"></div>
          </div>
        </div>
      </section>

      <!-- Right Column: Dispute Safe-Room -->
      <section>
        <div id="dispute-detail">
          <div class="empty-state">
            <p>Select a case from the active list to enter the safe-room.</p>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Slide-over Modal for Data Entry -->
  <div id="dispute-modal" class="modal-overlay">
    <div class="slide-over">
      <button id="close-modal" class="modal-close">&times;</button>
      <h2 style="font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; margin-bottom:0.5rem;">Open
        Dispute</h2>
      <p style="font-size:0.85rem; color:var(--muted); margin-bottom:2rem; line-height:1.6;">Provide the target
        execution ID and detail the failure points. A mediator will be assigned immediately.</p>

      <div id="form-err"></div>

      <form id="dispute-form">
        <div class="form-group">
          <label class="sh-label">Target Contract ID</label>
          <input name="contract_id" class="sh-input" placeholder="e.g. 1" required>
        </div>
        <div class="form-group">
          <label class="sh-label">Detailed Reasoning</label>
          <textarea name="reason" class="sh-textarea" style="min-height: 150px;"
            placeholder="Explain the contractual violation..." required></textarea>
        </div>
        <button type="submit" class="btn-danger" style="width:100%; margin-top:1rem;">Construct Dispute Case</button>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/dispute.js"></script>
</body>

</html>
