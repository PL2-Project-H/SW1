<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disputes | SpecialistHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="shell px-6 py-6">
    <nav id="nav-links" class="glass mb-8 flex items-center justify-between rounded-3xl border px-6 py-4"></nav>
    <div class="grid gap-6 lg:grid-cols-2">
      <div class="space-y-6">
        <section class="glass rounded-3xl border p-6">
          <h2 class="text-xl font-semibold">Your disputes</h2>
          <div id="dispute-list" class="mt-4 space-y-2 text-sm"></div>
        </section>
        <form id="dispute-form" class="glass rounded-3xl border p-6 space-y-4">
          <h1 class="text-2xl font-semibold">File Dispute</h1>
          <input name="contract_id" class="w-full rounded-2xl border px-4 py-3" placeholder="Contract ID">
          <textarea name="reason" class="h-32 w-full rounded-2xl border px-4 py-3" placeholder="Reason"></textarea>
          <button class="rounded-2xl bg-rose-600 px-4 py-3 text-white">Open Dispute</button>
        </form>
      </div>
      <section class="glass rounded-3xl border p-6">
        <div id="dispute-detail"></div>
        <div id="message-list" class="mt-6 space-y-3"></div>
        <form id="chat-form" class="mt-6 hidden space-y-3">
          <textarea id="chat_message" class="h-24 w-full rounded-2xl border px-4 py-3" placeholder="Safe-room message"></textarea>
          <button class="rounded-2xl bg-slate-950 px-4 py-3 text-white">Send Message</button>
        </form>
      </section>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/dispute.js"></script>
</body>
</html>
