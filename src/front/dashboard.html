<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | SpecialistHub</title>
  <link rel="stylesheet" href="css/app.css">
</head>

<body>
  <main class="shell">
    <div id="dashboard-header" style="margin-bottom: 2rem;">
      <h1 class="page-header" id="dashboard-title">Good morning</h1>
      <span id="role-badge" class="badge"></span>
    </div>

    <!-- Quick Actions -->
    <div style="margin-bottom: 3rem;">
      <div id="quick-actions" style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <!-- Injected via JS based on role -->
      </div>
    </div>

    <!-- Metrics -->
    <div style="margin-bottom: 3rem;">
      <h2 class="section-title">Overview</h2>
      <section id="dashboard-grid"
        style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem;"></section>
    </div>

    <!-- Notifications preview -->
    <div>
      <h2 class="section-title">Recent Activity</h2>
      <div id="dashboard-notifications"></div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>

</html>
