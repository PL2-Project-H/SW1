<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Detail | SpecialistHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="shell px-6 py-6">
    <nav id="nav-links" class="glass mb-8 flex items-center justify-between rounded-3xl border px-6 py-4"></nav>
    <div class="grid gap-6 lg:grid-cols-2">
      <section class="glass rounded-3xl border p-6">
        <h1 class="text-3xl font-semibold">Job Interaction</h1>
        <p class="mt-3 text-slate-600">Use this page after navigating from jobs. Client actions use the job ID from the query string.</p>
        <div id="job-bids" class="mt-6 space-y-3"></div>
      </section>
      <section class="glass rounded-3xl border p-6">
        <form id="bid-form" class="space-y-4">
          <h2 class="text-2xl font-semibold">Submit Bid</h2>
          <input name="amount" class="w-full rounded-2xl border px-4 py-3" placeholder="Amount">
          <input name="validity_days" class="w-full rounded-2xl border px-4 py-3" placeholder="Validity days">
          <textarea name="proposal_text" class="h-32 w-full rounded-2xl border px-4 py-3" placeholder="Proposal"></textarea>
          <button class="rounded-2xl bg-slate-950 px-4 py-3 text-white">Submit Versioned Bid</button>
        </form>
        <form id="interview-form" class="mt-8 space-y-4">
          <h2 class="text-2xl font-semibold">Schedule Interview</h2>
          <input name="freelancer_id" class="w-full rounded-2xl border px-4 py-3" placeholder="Freelancer ID">
          <input name="scheduled_at" type="datetime-local" class="w-full rounded-2xl border px-4 py-3">
          <input name="timezone" class="w-full rounded-2xl border px-4 py-3" placeholder="Timezone">
          <textarea name="notes" class="h-24 w-full rounded-2xl border px-4 py-3" placeholder="Notes"></textarea>
          <button class="rounded-2xl bg-sky-600 px-4 py-3 text-white">Schedule</button>
        </form>
        <div id="interview-list" class="mt-8 space-y-3"></div>
      </section>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkSession();
      const jobId = new URLSearchParams(location.search).get('job_id');
      const bidForm = document.getElementById('bid-form');
      const interviewForm = document.getElementById('interview-form');
      if (!jobId) return;
      if (user.role === 'freelancer') {
        const interviews = await apiCall(`project.php?action=interviews/mine&job_id=${jobId}`);
        document.getElementById('interview-list').innerHTML = `
          <h2 class="text-2xl font-semibold mb-4">Your Interviews</h2>
          ${interviews.map((interview) => {
            let actions = '';
            if (interview.status === 'pending') {
              actions = `<div class="mt-3 flex gap-2">
                  <button onclick="actionPost('project.php?action=interviews/respond',{interview_id:${interview.id},status:'accepted'})" class="rounded bg-emerald-600 px-3 py-2 text-sm text-white">Accept</button>
                  <button onclick="counterInterview(${interview.id})" class="rounded bg-amber-500 px-3 py-2 text-sm text-white">Counter</button>
                  <button onclick="actionPost('project.php?action=interviews/respond',{interview_id:${interview.id},status:'canceled'})" class="rounded bg-rose-600 px-3 py-2 text-sm text-white">Decline</button>
                </div>`;
            } else if (interview.status === 'countered') {
              actions = `<p class="mt-2 text-sm text-amber-700">You proposed a new time: ${interview.counter_scheduled_at || '—'} (${interview.counter_timezone || 'UTC'}). Waiting for the client to confirm.</p>`;
            }
            return `
            <div class="rounded-2xl border p-4 mb-3">
              <div class="font-semibold">Interview #${interview.id}</div>
              <div class="text-sm text-slate-500">Offered: ${interview.scheduled_at} ${interview.timezone} | Status: <span class="font-bold">${interview.status}</span></div>
              ${actions}
            </div>`;
          }).join('') || '<p class="text-slate-500">No interviews scheduled.</p>'}
        `;
        bidForm.addEventListener('submit', async (event) => {
          event.preventDefault();
          try {
            const payload = Object.fromEntries(new FormData(event.target).entries());
            payload.job_id = jobId;
            await apiCall('project.php?action=bids/submit', 'POST', payload);
            alert('Bid submitted');
            location.reload();
          } catch (e) {
            alert(e.message);
          }
        });
      } else {
        bidForm.classList.add('hidden');
        const [bids, interviews, contracts] = await Promise.all([
          apiCall(`client.php?action=bids&job_id=${jobId}`),
          apiCall(`client.php?action=interviews&job_id=${jobId}`),
          apiCall('project.php?action=contracts/active')
        ]);

        const jobContracts = contracts.filter(c => c.job_id == jobId);

        document.getElementById('job-bids').innerHTML = `
          <h2 class="text-2xl font-semibold mb-4">Bids</h2>
          ${bids.map((bid) => `
            <div class="rounded-2xl border p-4 mb-3">
              <div class="flex items-center justify-between">
                <div class="font-semibold">${bid.freelancer_name} | $${bid.amount}</div>
                <div class="badge ${bid.status === 'accepted' ? 'badge-open' : (bid.status === 'rejected' ? 'badge-danger' : 'badge-info')}">${bid.status}</div>
              </div>
              <div class="text-sm text-slate-500 mt-1">${bid.proposal_text}</div>
              ${bid.status === 'pending' ? `
                <div class="mt-3 flex gap-2">
                  <button onclick="acceptBidWithOptions(${bid.id})" class="rounded bg-emerald-600 px-3 py-2 text-sm text-white">Accept</button>
                  <button onclick="actionPost('client.php?action=bids/reject',{bid_id:${bid.id}})" class="rounded bg-rose-600 px-3 py-2 text-sm text-white">Reject</button>
                </div>
              ` : ''}
            </div>
          `).join('') || '<p class="text-slate-500">No bids yet.</p>'}
          
          <h2 class="text-2xl font-semibold mt-8 mb-4">Active Contracts</h2>
          ${jobContracts.map(c => `
            <div class="rounded-2xl border p-4 mb-3">
              <div class="flex items-center justify-between">
                <div class="font-semibold">Contract #${c.id}</div>
                <div class="badge badge-warning">${c.status}</div>
              </div>
              <div class="mt-3 flex gap-2">
                <a href="contract.html?contract_id=${c.id}" class="rounded bg-slate-800 px-3 py-2 text-sm text-white">Manage</a>
                ${c.status === 'pending_nda' ? `<button onclick="actionPost('client.php?action=contracts/nda/sign',{job_id:${c.job_id}})" class="rounded bg-indigo-600 px-3 py-2 text-sm text-white">Sign NDA</button>` : ''}
              </div>
            </div>
          `).join('') || '<p class="text-slate-500">No contracts created yet.</p>'}

          <h2 class="text-2xl font-semibold mt-8 mb-4">Scheduled Interviews</h2>
          ${interviews.map(i => `
            <div class="rounded-2xl border p-4 mb-3">
              <div class="font-semibold">Freelancer ID: ${i.freelancer_id}</div>
              <div class="text-sm text-slate-500">Current slot: ${i.scheduled_at} ${i.timezone} | <span class="font-bold">${i.status}</span></div>
              ${i.status === 'countered' && i.counter_scheduled_at ? `
                <div class="mt-2 text-sm text-amber-800">Freelancer proposed: ${i.counter_scheduled_at} (${i.counter_timezone || 'UTC'})</div>
                <button onclick="actionPost('client.php?action=interviews/accept-counter',{interview_id:${i.id}})" class="mt-2 rounded bg-emerald-600 px-3 py-2 text-sm text-white">Accept freelancer time</button>
              ` : ''}
            </div>
          `).join('') || '<p class="text-slate-500">No interviews scheduled yet.</p>'}
        `;

        interviewForm.addEventListener('submit', async (event) => {
          event.preventDefault();
          try {
            const payload = Object.fromEntries(new FormData(event.target).entries());
            payload.job_id = jobId;
            await apiCall('client.php?action=interviews/schedule', 'POST', payload);
            alert('Interview scheduled');
            location.reload();
          } catch (e) {
            alert(e.message);
          }
        });
      }
    });
    async function actionPost(endpoint, body) {
      try {
        await apiCall(endpoint, 'POST', body);
        location.reload();
      } catch (e) {
        alert(e.message);
      }
    }
    async function acceptBidWithOptions(bidId) {
      const pctRaw = window.prompt('Partial escrow release on deliverable submit (0–100; 0 = none)', '0');
      if (pctRaw === null) return;
      const partial_release_pct = Math.max(0, Math.min(100, parseInt(pctRaw, 10) || 0));
      try {
        await apiCall('client.php?action=bids/accept', 'POST', { bid_id: bidId, partial_release_pct });
        location.reload();
      } catch (e) {
        alert(e.message);
      }
    }
    async function counterInterview(interviewId) {
      try {
        const scheduledAt = prompt('Enter alternative datetime in format YYYY-MM-DD HH:MM:SS');
        if (!scheduledAt) return;
        const timezone = prompt('Enter timezone', 'UTC') || 'UTC';
        await apiCall('project.php?action=interviews/respond', 'POST', { interview_id: interviewId, status: 'countered', scheduled_at: scheduledAt, timezone });
        location.reload();
      } catch (e) {
        alert(e.message);
      }
    }
  </script>
</body>
</html>
