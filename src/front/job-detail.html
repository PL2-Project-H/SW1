<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Detail | SpecialistHub</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    .dual-pane {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      align-items: start;
    }

    @media (min-width: 1024px) {
      .dual-pane {
        grid-template-columns: 1fr 1fr;
      }
    }

    .slide-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.4s ease;
      margin-top: 0;
      background: rgba(255, 255, 255, 0.4);
      border-radius: var(--radius-card);
    }

    .slide-panel.show {
      max-height: 800px;
      opacity: 1;
      margin-top: 1rem;
      padding: 1.5rem;
      border: 1px solid var(--border);
    }

    .card-awarded {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.9), rgba(201, 168, 76, 0.1));
      border: 1px solid var(--gold) !important;
    }
  </style>
</head>

<body>
  <main class="shell">
    <div class="dual-pane">


      <section>
        <h1 class="page-header" style="margin-bottom: 2rem;">Interaction Hub</h1>

        <div id="job-bids"></div>
      </section>


      <section>
        <div class="card" id="freelancer-bid-box" style="display:none; margin-bottom: 2rem;">
          <div class="card-header">
            <h2 style="font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700;">Submit Bid</h2>
          </div>
          <div class="card-body">
            <div id="bid-err"></div>
            <form id="bid-form">
              <div class="form-grid">
                <div class="form-group">
                  <label class="sh-label">Amount (USD)</label>
                  <input name="amount" class="sh-input" placeholder="e.g. 5000" required>
                </div>
                <div class="form-group">
                  <label class="sh-label">Validity (Days)</label>
                  <input name="validity_days" class="sh-input" placeholder="30" required>
                </div>
              </div>
              <div class="form-group">
                <label class="sh-label">Proposal</label>
                <textarea name="proposal_text" class="sh-textarea" placeholder="Detail your approach..."
                  required></textarea>
              </div>
              <button class="btn-primary" style="width:100%;">Submit Proposal</button>
            </form>
          </div>
        </div>

        <div class="card" id="client-actions-box" style="display:none;">
          <div class="card-header">
            <h2 style="font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700;">Job Actions</h2>
            <button id="toggle-interview-btn" class="btn-secondary btn-sm" style="border-radius: 9999px;">+ Schedule
              Interview</button>
          </div>

          <div id="interview-form-wrapper" class="slide-panel">
            <h3 style="font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; margin-bottom: 1rem;">
              Setup Interview</h3>
            <div id="int-err"></div>
            <form id="interview-form">
              <div class="form-group">
                <label class="sh-label">Freelancer ID</label>
                <input name="freelancer_id" class="sh-input" placeholder="Enter ID" required>
              </div>
              <div class="form-group">
                <label class="sh-label">Time & Date</label>
                <input name="scheduled_at" type="datetime-local" class="sh-input" required>
              </div>
              <div class="form-group">
                <label class="sh-label">Timezone</label>
                <input name="timezone" class="sh-input" placeholder="UTC" value="UTC" required>
              </div>
              <div class="form-group">
                <label class="sh-label">Notes</label>
                <textarea name="notes" class="sh-textarea shadow-sm" style="min-height: 80px;"
                  placeholder="Meet link, context..."></textarea>
              </div>
              <button class="btn-primary" style="width:100%;">Send Invite</button>
            </form>
          </div>

          <div class="card-body">
            <div id="interview-list"></div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await checkSession();
      if (!user) return;
      const jobId = new URLSearchParams(location.search).get('job_id');
      if (!jobId) {
        document.querySelector('.dual-pane').innerHTML = `<div class="empty-state"><p>No Job ID specified.</p></div>`;
        return;
      }

      const bidForm = document.getElementById('bid-form');
      const interviewForm = document.getElementById('interview-form');
      const bidBox = document.getElementById('freelancer-bid-box');
      const actBox = document.getElementById('client-actions-box');

      if (user.role === 'freelancer') {
        bidBox.style.display = 'block';
        actBox.style.display = 'block';
        document.getElementById('toggle-interview-btn').style.display = 'none';

        try {
          const interviews = await apiCall(`project.php?action=interviews/mine&job_id=${jobId}`);
          document.getElementById('interview-list').innerHTML = `
            <div style="margin-bottom:1rem; font-weight:700; font-family:'Playfair Display',serif; font-size:1.2rem;">Your Interviews</div>
            ${interviews.map((interview) => {
            let actions = '';
            if (interview.status === 'pending') {
              actions = `<div style="display:flex; gap:0.5rem; margin-top:1rem;">
                    <button onclick="actionPost('project.php?action=interviews/respond',{interview_id:${interview.id},status:'accepted'})" class="btn-primary btn-sm" style="background:var(--success);color:white;">Accept</button>
                    <button onclick="counterInterview(${interview.id})" class="btn-secondary btn-sm">Counter</button>
                    <button onclick="actionPost('project.php?action=interviews/respond',{interview_id:${interview.id},status:'canceled'})" class="btn-danger btn-sm">Decline</button>
                  </div>`;
            } else if (interview.status === 'countered') {
              actions = `<p style="margin-top:0.75rem; font-size:0.8rem; color:var(--muted); font-style:italic;">You proposed a new time: ${interview.counter_scheduled_at || '—'} (${interview.counter_timezone || 'UTC'}). Waiting for the client to confirm.</p>`;
            }
            return `
              <div class="card" style="margin-bottom:1rem;">
                <div class="card-body">
                  <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div style="font-weight:600; font-size:1.1rem;">Interview #${interview.id}</div>
                    <span class="badge ${interview.status === 'pending' ? 'badge-warning' : 'badge-gold'}">${interview.status}</span>
                  </div>
                  <div style="margin-top:0.75rem; font-size:0.85rem; color:var(--muted);">
                    Offered time: ${interview.scheduled_at} <br> Timezone: ${interview.timezone}
                  </div>
                  ${actions}
                </div>
              </div>`;
          }).join('') || '<div class="empty-state" style="padding:1.5rem;"><p>No interviews scheduled.</p></div>'}
          `;
        } catch (e) {
          document.getElementById('interview-list').innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
        }

        bidForm.addEventListener('submit', async (event) => {
          event.preventDefault();
          const btn = event.target.querySelector('button');
          btn.textContent = 'Submitting...';
          try {
            const payload = Object.fromEntries(new FormData(event.target).entries());
            payload.job_id = jobId;
            await apiCall('project.php?action=bids/submit', 'POST', payload);
            showSuccess(document.getElementById('bid-err'), 'Bid submitted');
            setTimeout(() => location.reload(), 1500);
          } catch (e) {
            btn.textContent = 'Submit Proposal';
            showError(document.getElementById('bid-err'), e.message);
          }
        });

      } else {

        actBox.style.display = 'block';

        document.getElementById('toggle-interview-btn').addEventListener('click', () => {
          document.getElementById('interview-form-wrapper').classList.toggle('show');
        });

        try {
          const [bids, interviews, contracts] = await Promise.all([
            apiCall(`client.php?action=bids&job_id=${jobId}`),
            apiCall(`client.php?action=interviews&job_id=${jobId}`),
            apiCall('project.php?action=contracts/active')
          ]);

          const jobContracts = contracts.filter(c => c.job_id == jobId);

          document.getElementById('job-bids').innerHTML = `
            <h2 class="section-title">Submitted Bids</h2>
            ${bids.map((bid) => `
              <div class="card ${bid.status === 'accepted' ? 'card-awarded' : ''}" style="margin-bottom:1rem;">
                <div class="card-body">
                  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 0.5rem;">
                    <div style="font-weight:700; font-family:'Playfair Display',serif; font-size:1.2rem;">${bid.freelancer_name}</div>
                    <div class="badge ${bid.status === 'accepted' ? 'badge-open' : (bid.status === 'rejected' ? 'badge-danger' : 'badge-info')}">${bid.status}</div>
                  </div>
                  <div style="font-weight:600; color:var(--ink); font-size:1.1rem; margin-bottom:1rem;">$${parseFloat(bid.amount).toLocaleString()}</div>
                  <div style="font-size:0.9rem; color:var(--muted); line-height:1.6;">${bid.proposal_text}</div>
                  
                  ${bid.status === 'pending' ? `
                    <div style="margin-top:1.5rem; display:flex; gap:0.5rem;">
                      <button onclick="acceptBidWithOptions(${bid.id})" class="btn-primary btn-sm">Award Contract</button>
                      <button onclick="actionPost('client.php?action=bids/reject',{bid_id:${bid.id}})" class="btn-secondary btn-sm" style="color:var(--danger); border-color:transparent;">Reject</button>
                    </div>
                  ` : ''}
                </div>
              </div>
            `).join('') || '<div class="empty-state"><p>No proposals submitted yet.</p></div>'}

            <h2 class="section-title" style="margin-top: 3rem;">Active Contracts</h2>
            ${jobContracts.map(c => `
              <div class="card" style="margin-bottom:1rem;">
                <div class="card-body" style="display:flex; justify-content:space-between; align-items:center;">
                  <div>
                    <div style="font-weight:600; font-size:1.1rem; margin-bottom:0.25rem;">Contract #${c.id}</div>
                    <span class="badge badge-warning">${c.status}</span>
                  </div>
                  <div style="display:flex; gap:0.5rem;">
                    ${c.status === 'pending_nda' ? `<button onclick="actionPost('client.php?action=contracts/nda/sign',{job_id:${c.job_id}})" class="btn-primary btn-sm" style="background:var(--gold);color:var(--ink);">Sign NDA</button>` : ''}
                    <a href="contract.html?contract_id=${c.id}" class="btn-secondary btn-sm">Manage</a>
                  </div>
                </div>
              </div>
            `).join('') || '<div class="empty-state"><p>No contracts finalized.</p></div>'}
          `;

          document.getElementById('interview-list').innerHTML = `
            <div style="margin-bottom:1rem; font-weight:700; font-family:'Playfair Display',serif; font-size:1.2rem;">Scheduled Interviews</div>
            ${interviews.map(i => `
              <div class="card" style="margin-bottom:1rem; background: rgba(255,255,255,0.4);">
                <div class="card-body">
                  <div style="font-weight:600; font-size:0.9rem;">Freelancer ID: ${i.freelancer_id}</div>
                  <div style="margin-top:0.4rem; font-size:0.8rem; color:var(--muted);">Slot: ${i.scheduled_at} ${i.timezone} | <span style="font-weight:600;color:var(--ink);">${i.status}</span></div>
                  ${i.status === 'countered' && i.counter_scheduled_at ? `
                    <div style="margin-top:0.75rem; padding:0.75rem; background:var(--gold-light); border-radius:4px; font-size:0.8rem; color:var(--ink);">
                      Freelancer proposed: ${i.counter_scheduled_at} (${i.counter_timezone || 'UTC'})
                    </div>
                    <button onclick="actionPost('client.php?action=interviews/accept-counter',{interview_id:${i.id}})" class="btn-primary btn-sm" style="margin-top:0.75rem;">Accept new time</button>
                  ` : ''}
                </div>
              </div>
            `).join('') || '<div class="empty-state" style="padding:1.5rem;"><p>No interviews scheduled.</p></div>'}
          `;
        } catch (e) { }

        interviewForm.addEventListener('submit', async (event) => {
          event.preventDefault();
          const btn = event.target.querySelector('button');
          btn.textContent = 'Scheduling...';
          try {
            const payload = Object.fromEntries(new FormData(event.target).entries());
            payload.job_id = jobId;
            await apiCall('client.php?action=interviews/schedule', 'POST', payload);
            showSuccess(document.getElementById('int-err'), 'Interview scheduled');
            setTimeout(() => location.reload(), 1500);
          } catch (e) {
            btn.textContent = 'Send Invite';
            showError(document.getElementById('int-err'), e.message);
          }
        });
      }
    });

    async function actionPost(endpoint, body) {
      document.body.style.opacity = '0.5';
      try {
        await apiCall(endpoint, 'POST', body);
        location.reload();
      } catch (e) {
        document.body.style.opacity = '1';
        alert(e.message);
      }
    }

    async function acceptBidWithOptions(bidId) {
      const pctRaw = window.prompt('Partial escrow release on deliverable submit (0–100; 0 = none)', '0');
      if (pctRaw === null) return;
      const partial_release_pct = Math.max(0, Math.min(100, parseInt(pctRaw, 10) || 0));
      document.body.style.opacity = '0.5';
      try {
        await apiCall('client.php?action=bids/accept', 'POST', { bid_id: bidId, partial_release_pct });
        location.reload();
      } catch (e) {
        document.body.style.opacity = '1';
        alert(e.message);
      }
    }
    async function counterInterview(interviewId) {
      try {
        const scheduledAt = prompt('Enter alternative datetime in format YYYY-MM-DD HH:MM:SS');
        if (!scheduledAt) return;
        const timezone = prompt('Enter timezone', 'UTC') || 'UTC';
        document.body.style.opacity = '0.5';
        await apiCall('project.php?action=interviews/respond', 'POST', { interview_id: interviewId, status: 'countered', scheduled_at: scheduledAt, timezone });
        location.reload();
      } catch (e) {
        document.body.style.opacity = '1';
        alert(e.message);
      }
    }
  </script>
</body>

</html>
