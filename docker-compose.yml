services:
  app:
    build: .
    command: >
      sh -lc "mkdir -p /var/www/html/uploads &&
              mkdir -p /var/www/html/storage/evidence &&
              chmod -R 0777 /var/www/html/uploads /var/www/html/storage &&
              apache2-foreground"
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: specialisthub
      DB_USER: specialisthub
      DB_PASS: specialisthub

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: specialisthub
      MYSQL_USER: specialisthub
      MYSQL_PASSWORD: specialisthub
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./src/Core/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/Core/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

volumes:
  db_data:
